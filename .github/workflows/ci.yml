name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: hashFiles('requirements.txt', 'pyproject.toml') != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: hashFiles('requirements.txt') != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Python project
        if: hashFiles('pyproject.toml') != ''
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        if: hashFiles('package.json') != ''
        run: npm ci

      - name: Make scripts executable
        run: |
          chmod +x scripts/*.sh || true

      - name: Run verification script
        if: hashFiles('scripts/verify.sh') != ''
        run: ./scripts/verify.sh

      - name: Run Python tests directly
        if: hashFiles('scripts/verify.sh') == '' && hashFiles('requirements.txt', 'pyproject.toml') != ''
        run: pytest

      - name: Run Node tests directly
        if: hashFiles('scripts/verify.sh') == '' && hashFiles('package.json') != ''
        run: npm test